<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Lomar Cromar</title>
</head>
<body>
    <h1>Omar is not the boss</h1>
    <p>Um site criado por um ser humano anormal neste planeta</p>
    <p>Oloko pq tu tá ainda lendo isto</p>
    <img src="https://i.redd.it/nerd-emoji-3873x3873-and-5000x5000-respectively-v0-k76edqwtavu81.jpg?width=5000&format=pjpg&auto=webp&s=747a755a0189794da91c4c7821a10d5180feecb8" width="400" height="300" alt="omar">
    <style>
        .btn-toggle {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-toggle.active {
            background: #0054a6;
            color: white;
            border-color: #0054a6;
        }

        .color-picker {
            display: flex;
            gap: 10px;
        }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .color-dot.selected { border-color: #333; }
    </style>
<body>
    <button class="btn-toggle" id="darkModeBtn" onclick="toggleDarkMode()">Ativar</button>
</body>
</html>
